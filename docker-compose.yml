services:

  db:
    image: postgis/postgis:15-3.3
    container_name: geo_db
    restart: always
    env_file:
      - .env

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

    networks:
      - geo_network

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: ./app
    container_name: geo_app
    restart: always

    env_file:
      - .env

    depends_on:
      db:
        condition: service_healthy

    networks:
      - geo_network

  proxy:
    image: nginx:latest
    container_name: geo_proxy
    restart: always

    ports:
      - "8080:80"

    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf

    depends_on:
      - app

    networks:
      - geo_network

volumes:
  postgres_data:

networks:
  geo_network:
    driver: bridge
